<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitra</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="terminal">
        <div class="line"><span class="prompt">user@elitra:~$</span> <span class="cmd">cat /var/www/status</span></div>
        <div class="line"><span class="prompt">user@elitra:~$</span> <span class="output">Сайт находится в разработке.</span></div>
        <div class="line"><span class="prompt">user@elitra:~$</span> <span class="output">Ведутся технические работы.</span></div>
        <div class="line blink"><span class="prompt">user@elitra:~$</span> <span class="cursor">_</span></div>
    </div>
</body>
</html>
