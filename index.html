<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Мегаполис 3D — реалистичная прогулка</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        #ui { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; z-index: 20; pointer-events: none; text-shadow: 1px 1px 2px black; }
        .controls-hint { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 40px; font-size: 14px; color: #eee; font-family: monospace; border-left: 3px solid #ffaa66; }
        .controls-hint kbd { background: #2c2c2c; border-radius: 6px; padding: 2px 8px; margin: 0 4px; color: #ffcc88; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 2px rgba(0,0,0,0.4); z-index: 20; pointer-events: none; }
        .info { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: #ddd; pointer-events: none; }
        .fullscreen-btn { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); border: none; border-radius: 40px; padding: 8px 16px; color: white; cursor: pointer; z-index: 30; font-weight: bold; }
        .touch-controls { position: absolute; bottom: 30px; right: 20px; left: 20px; display: none; justify-content: space-between; z-index: 25; pointer-events: none; }
        .touch-panel { pointer-events: auto; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px); border-radius: 60px; padding: 12px 20px; display: flex; gap: 25px; }
        .touch-btn { background: rgba(30,30,40,0.85); border: none; color: #ffdd99; font-size: 28px; width: 65px; height: 65px; border-radius: 50%; cursor: pointer; }
        .touch-btn:active { background: #ffaa33; transform: scale(0.95); }
        @media (max-width: 768px) { .touch-controls { display: flex; } .touch-btn { width: 55px; height: 55px; font-size: 24px; } .controls-hint { font-size: 10px; } }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreen-btn">⛶ Полный экран</button>
    <div id="ui">
        <div class="controls-hint">🚶‍♂️ Прогулка &nbsp;|&nbsp; <kbd>WASD</kbd> или 🎮 кнопки &nbsp;|&nbsp; 🖱️ Мышь/палец для обзора</div>
        <div class="info">🏙️ Реалистичный мегаполис • Высотки до 25 этажей</div>
    </div>
    <div id="crosshair"></div>
    <div class="touch-controls" id="touchControls">
        <div></div>
        <div class="touch-panel">
            <button class="touch-btn" data-key="w">▲</button>
            <button class="touch-btn" data-key="a">◀</button>
            <button class="touch-btn" data-key="s">▼</button>
            <button class="touch-btn" data-key="d">▶</button>
        </div>
        <div></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- СЦЕНА С ФОНОМ И ТУМАНОМ (реалистичная дымка) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6ba5d0); // более приглушённое небо
        scene.fog = new THREE.FogExp2(0x6ba5d0, 0.008); // лёгкая дымка для глубины
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 250);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // мягкие тени
        renderer.shadowMap.bias = 0.0001;
        document.body.appendChild(renderer.domElement);
        
        // --- ОСВЕЩЕНИЕ (реалистичное: солнце + заполняющий свет) ---
        // Ambient свет приглушённый, чтобы не было мыльности
        const ambientLight = new THREE.AmbientLight(0x4a5b6e, 0.45);
        scene.add(ambientLight);
        
        // Основной направленный свет (солнце) с высоким разрешением теней
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.35);
        sunLight.position.set(25, 30, 10);
        sunLight.castShadow = true;
        sunLight.receiveShadow = false;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 80;
        sunLight.shadow.camera.left = -20;
        sunLight.shadow.camera.right = 20;
        sunLight.shadow.camera.top = 20;
        sunLight.shadow.camera.bottom = -20;
        scene.add(sunLight);
        
        // Заполняющий свет снизу (отражение от земли)
        const fillLight = new THREE.PointLight(0xccaa88, 0.35);
        fillLight.position.set(0, 3, 0);
        scene.add(fillLight);
        
        // Контражур для подсветки фасадов
        const backLight = new THREE.PointLight(0xaaccff, 0.28);
        backLight.position.set(-10, 15, -15);
        scene.add(backLight);
        
        // --- ЗЕМЛЯ И ДОРОГИ (текстуры с анизотропией для чёткости) ---
        const textureLoader = new THREE.TextureLoader();
        let grassTexture, tileTexture;
        
        // Функция загрузки текстур с fallback на цвет
        function loadTexture(url, fallbackColor) {
            const tex = textureLoader.load(url, 
                (t) => { t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping; t.repeat.set(6,6); t.anisotropy = 16; },
                undefined,
                (err) => { console.warn(`Текстура ${url} не загружена, использую цвет`); }
            );
            return tex;
        }
        
        grassTexture = loadTexture('./assets/textures/grass.jpeg', 0x6d9e4e);
        tileTexture = loadTexture('./assets/textures/white_tiled_path.jpeg', 0xe0d5b6);
        
        // Если текстуры не загрузились, используем цветные материалы
        const grassMaterial = new THREE.MeshStandardMaterial({ map: grassTexture, roughness: 0.75, metalness: 0.05, color: 0x6d9e4e });
        const pathMaterial = new THREE.MeshStandardMaterial({ map: tileTexture, roughness: 0.45, metalness: 0.08, color: 0xe0d5b6 });
        
        // Основание (газон)
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(140, 140), grassMaterial);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.1;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Дорожки (плитка)
        const horizontalRoad = new THREE.Mesh(new THREE.PlaneGeometry(50, 7), pathMaterial);
        horizontalRoad.rotation.x = -Math.PI / 2;
        horizontalRoad.position.set(0, -0.05, 0);
        horizontalRoad.receiveShadow = true;
        scene.add(horizontalRoad);
        
        const verticalRoad = new THREE.Mesh(new THREE.PlaneGeometry(7, 50), pathMaterial);
        verticalRoad.rotation.x = -Math.PI / 2;
        verticalRoad.position.set(0, -0.05, 0);
        verticalRoad.receiveShadow = true;
        scene.add(verticalRoad);
        
        // Центральная площадь с плиткой
        const centralSquare = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), pathMaterial);
        centralSquare.rotation.x = -Math.PI / 2;
        centralSquare.position.set(0, -0.05, 0);
        centralSquare.receiveShadow = true;
        scene.add(centralSquare);
        
        // --- ГЕНЕРАЦИЯ ВЫСОКИХ РАЗНОЭТАЖНЫХ ЗДАНИЙ (высота от 8 до 28) ---
        const buildingColors = [0x9e8b72, 0xb8a28c, 0x8e7a62, 0xa5927a, 0xbcab93, 0x7d6952, 0xc9b69b, 0xaa987d];
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xfff4cf, emissive: 0x442200, emissiveIntensity: 0.12 });
        const buildingPositions = [];
        
        function createHighRise(x, z, width, depth, height, colorVariant) {
            const material = new THREE.MeshStandardMaterial({ color: buildingColors[colorVariant % buildingColors.length], roughness: 0.25, metalness: 0.1 });
            const building = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
            building.position.set(x, height / 2, z);
            building.castShadow = true;
            building.receiveShadow = true;
            scene.add(building);
            
            // Окна с эффектом свечения (на всех фасадах)
            const floors = Math.floor(height / 1.5);
            for (let floor = 0; floor < floors; floor++) {
                const yPos = 0.8 + floor * 1.5;
                // Окна по периметру
                const windowWidth = 0.5;
                const windowHeight = 0.9;
                const windowDepth = 0.05;
                const offsets = [-width/2 + 0.4, width/2 - 0.4];
                offsets.forEach(offX => {
                    const windowCube = new THREE.Mesh(new THREE.BoxGeometry(windowWidth, windowHeight, windowDepth), windowMat);
                    windowCube.position.set(x + offX, yPos, z + depth/2 + 0.05);
                    windowCube.castShadow = false;
                    scene.add(windowCube);
                    
                    const windowCubeBack = new THREE.Mesh(new THREE.BoxGeometry(windowWidth, windowHeight, windowDepth), windowMat);
                    windowCubeBack.position.set(x + offX, yPos, z - depth/2 - 0.05);
                    windowCubeBack.castShadow = false;
                    scene.add(windowCubeBack);
                });
                const offsetsZ = [-depth/2 + 0.4, depth/2 - 0.4];
                offsetsZ.forEach(offZ => {
                    const windowSide = new THREE.Mesh(new THREE.BoxGeometry(windowDepth, windowHeight, windowWidth), windowMat);
                    windowSide.position.set(x + width/2 + 0.05, yPos, z + offZ);
                    windowSide.castShadow = false;
                    scene.add(windowSide);
                    
                    const windowSideBack = new THREE.Mesh(new THREE.BoxGeometry(windowDepth, windowHeight, windowWidth), windowMat);
                    windowSideBack.position.set(x - width/2 - 0.05, yPos, z + offZ);
                    windowSideBack.castShadow = false;
                    scene.add(windowSideBack);
                });
            }
            
            buildingPositions.push({ x, z, radius: Math.max(width, depth) * 0.55 });
            return building;
        }
        
        // Создаём разнообразные здания: от 8 до 28 высотой, разная ширина/глубина
        const gridRange = 6; // 6x6 кварталов
        for (let i = -gridRange; i <= gridRange; i++) {
            for (let j = -gridRange; j <= gridRange; j++) {
                if (i === 0 && j === 0) continue; // центральная площадь
                const x = i * 6.2 + (Math.random() - 0.5) * 1.5;
                const z = j * 6.2 + (Math.random() - 0.5) * 1.5;
                if (Math.abs(x) < 8 && Math.abs(z) < 8) continue; // оставляем центр свободным
                const width = 1.8 + Math.random() * 1.2;
                const depth = 1.8 + Math.random() * 1.2;
                // Высота: от 8 до 28 (раза в 2-3 выше предыдущих)
                const height = 8 + Math.random() * 20;
                const colorIdx = Math.floor(Math.random() * buildingColors.length);
                createHighRise(x, z, width, depth, height, colorIdx);
            }
        }
        
        // Добавим угловые небоскрёбы (ещё выше)
        const corners = [[-22,-18],[22,-18],[-22,22],[22,22],[-25,0],[25,0],[0,-25],[0,25]];
        corners.forEach(pos => {
            const w = 2.5 + Math.random() * 1.5;
            const d = 2.5 + Math.random() * 1.5;
            const h = 22 + Math.random() * 12;
            createHighRise(pos[0], pos[1], w, d, h, Math.floor(Math.random()*buildingColors.length));
        });
        
        // --- ДЕРЕВЬЯ (оптимизированные, с меньшим количеством полигонов и теней) ---
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x7c5e3a, roughness: 0.9 });
        const foliageMat = new THREE.MeshStandardMaterial({ color: 0x6f9e4e, roughness: 0.6 });
        const treePositions = [];
        // Уменьшим количество деревьев до 90 для производительности
        for (let i = 0; i < 90; i++) {
            let x = (Math.random() - 0.5) * 46;
            let z = (Math.random() - 0.5) * 46;
            if (Math.abs(x) < 9 && Math.abs(z) < 9) continue;
            let ok = true;
            for (let b of buildingPositions) if (Math.hypot(x - b.x, z - b.z) < 1.8) ok = false;
            if (ok && Math.abs(x) < 28 && Math.abs(z) < 28) {
                const group = new THREE.Group();
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 1.6, 5), trunkMat);
                trunk.position.y = 0.8;
                trunk.castShadow = true;
                group.add(trunk);
                const f1 = new THREE.Mesh(new THREE.ConeGeometry(0.85, 1.2, 6), foliageMat);
                f1.position.y = 1.7;
                f1.castShadow = true;
                group.add(f1);
                const f2 = new THREE.Mesh(new THREE.ConeGeometry(0.7, 1.0, 6), foliageMat);
                f2.position.y = 2.5;
                f2.castShadow = true;
                group.add(f2);
                group.position.set(x, 0, z);
                scene.add(group);
                treePositions.push({ x, z, radius: 0.65 });
            }
        }
        
        // --- ФОНАРИ (упрощённые для производительности) ---
        const lampMat = new THREE.MeshStandardMaterial({ color: 0xbfa67a });
        const lampLightMat = new THREE.MeshStandardMaterial({ color: 0xffdd99, emissive: 0xffaa44, emissiveIntensity: 0.3 });
        function addLamp(x, z) {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.4, 3.8, 5), lampMat);
            pole.position.set(x, 1.9, z);
            pole.castShadow = true;
            scene.add(pole);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.38, 6), lampLightMat);
            head.position.set(x, 3.9, z);
            head.castShadow = false;
            scene.add(head);
            const light = new THREE.PointLight(0xffaa66, 0.5, 18);
            light.position.set(x, 3.6, z);
            scene.add(light);
        }
        for (let i = -20; i <= 20; i+=5) if (Math.abs(i) > 7) { addLamp(i,0); addLamp(0,i); addLamp(i,i); addLamp(-i,i); }
        
        // --- УПРАВЛЕНИЕ ОТ ПЕРВОГО ЛИЦА (рост 1.7) ---
        const yawObject = new THREE.Object3D();
        const pitchObject = new THREE.Object3D();
        pitchObject.add(camera);
        yawObject.add(pitchObject);
        scene.add(yawObject);
        yawObject.position.set(0, 1.7, 0);
        camera.position.set(0, 0, 0);
        
        const keyState = { KeyW: false, KeyS: false, KeyA: false, KeyD: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let moveForward = false, moveBack = false, moveLeft = false, moveRight = false;
        const MOVE_SPEED = 6.2;
        function updateMoveFlags() {
            moveForward = keyState.KeyW || keyState.ArrowUp;
            moveBack = keyState.KeyS || keyState.ArrowDown;
            moveLeft = keyState.KeyA || keyState.ArrowLeft;
            moveRight = keyState.KeyD || keyState.ArrowRight;
        }
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyR') { yawObject.position.set(0,1.7,0); yawObject.rotation.y=0; pitchObject.rotation.x=0; yawRotation=0; pitchRotation=0; e.preventDefault(); return; }
            if (keyState.hasOwnProperty(e.code)) { keyState[e.code] = true; updateMoveFlags(); e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (keyState.hasOwnProperty(e.code)) { keyState[e.code] = false; updateMoveFlags(); e.preventDefault(); }
        });
        
        let yawRotation = 0, pitchRotation = 0;
        const mouseSensitivity = 0.0022;
        let isPointerLock = false;
        let isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        let touchStartX = 0, touchStartY = 0, touchActive = false;
        
        function handleTouchStart(e) { if (!isMobile) return; e.preventDefault(); const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; touchActive = true; }
        function handleTouchMove(e) { if (!isMobile || !touchActive) return; e.preventDefault(); const t = e.touches[0]; const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY; if (Math.abs(dx) > 2 || Math.abs(dy) > 2) { yawRotation -= dx * mouseSensitivity; pitchRotation -= dy * mouseSensitivity; pitchRotation = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, pitchRotation)); yawObject.rotation.y = yawRotation; pitchObject.rotation.x = pitchRotation; touchStartX = t.clientX; touchStartY = t.clientY; } }
        function handleTouchEnd(e) { touchActive = false; }
        
        if (isMobile) {
            renderer.domElement.style.touchAction = 'none';
            renderer.domElement.addEventListener('touchstart', handleTouchStart, { passive: false });
            renderer.domElement.addEventListener('touchmove', handleTouchMove, { passive: false });
            renderer.domElement.addEventListener('touchend', handleTouchEnd);
        } else {
            const canvas = renderer.domElement;
            canvas.addEventListener('click', () => canvas.requestPointerLock());
            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === canvas) {
                    isPointerLock = true;
                    document.addEventListener('mousemove', onMouseMove);
                    document.body.style.cursor = 'none';
                } else {
                    isPointerLock = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.body.style.cursor = 'auto';
                }
            });
            function onMouseMove(e) { if (!isPointerLock) return; yawRotation -= e.movementX * mouseSensitivity; pitchRotation -= e.movementY * mouseSensitivity; pitchRotation = Math.max(-Math.PI/2.3, Math.min(Math.PI/2.3, pitchRotation)); yawObject.rotation.y = yawRotation; pitchObject.rotation.x = pitchRotation; }
        }
        
        // --- КОЛЛИЗИИ (оптимизированные) ---
        const collidables = [...buildingPositions, ...treePositions];
        function checkCollision(x, z) {
            for (let c of collidables) if (Math.hypot(x - c.x, z - c.z) < c.radius + 0.45) return true;
            return Math.abs(x) > 34 || Math.abs(z) > 34;
        }
        
        let lastTime = performance.now();
        function updateMovement(delta) {
            if (!isMobile && !isPointerLock && !document.pointerLockElement && !isMobile) return;
            const speed = MOVE_SPEED * delta;
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(yawObject.quaternion);
            const right = new THREE.Vector3(1,0,0).applyQuaternion(yawObject.quaternion);
            let dx = 0, dz = 0;
            if (moveForward) { dx += forward.x; dz += forward.z; }
            if (moveBack) { dx -= forward.x; dz -= forward.z; }
            if (moveLeft) { dx -= right.x; dz -= right.z; }
            if (moveRight) { dx += right.x; dz += right.z; }
            const len = Math.hypot(dx, dz);
            if (len > 0.01) { dx /= len; dz /= len; }
            let newX = yawObject.position.x + dx * speed;
            let newZ = yawObject.position.z + dz * speed;
            if (!checkCollision(newX, yawObject.position.z)) yawObject.position.x = newX;
            if (!checkCollision(yawObject.position.x, newZ)) yawObject.position.z = newZ;
        }
        
        // --- ДЕКОРАТИВНЫЕ ОБЛАКА (мало, чтобы не грузить)---
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xf5f7fc, transparent: true, opacity: 0.85 });
        for (let i = 0; i < 25; i++) {
            const cg = new THREE.Group();
            [0.8,0.6,0.5].forEach((s,idx) => { const p = new THREE.Mesh(new THREE.SphereGeometry(s, 5), cloudMat); p.position.set(idx*0.7-0.7, idx*0.2-0.2,0); cg.add(p); });
            cg.position.set((Math.random()-0.5)*70, 14+Math.random()*10, (Math.random()-0.5)*50-25);
            scene.add(cg);
        }
        
        // --- СЕНСОРНЫЕ КНОПКИ ---
        document.querySelectorAll('.touch-btn').forEach(btn => {
            const code = `Key${btn.dataset.key.toUpperCase()}`;
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keyState[code] = true; updateMoveFlags(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keyState[code] = false; updateMoveFlags(); });
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); keyState[code] = true; updateMoveFlags(); });
            btn.addEventListener('mouseup', (e) => { e.preventDefault(); keyState[code] = false; updateMoveFlags(); });
        });
        
        // --- ПОЛНОЭКРАННЫЙ РЕЖИМ ---
        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        
        // --- ПРОСТАЯ АНИМАЦИЯ ОБЛАКОВ (оптимизированная)---
        let cloudTime = 0;
        function animateClouds(delta) {
            cloudTime += delta * 0.05;
            // не делаем сложных движений, чтобы не грузить
        }
        
        // --- ГЛАВНЫЙ ЦИКЛ С ФРУСТУМ-КУЛЛИНГОМ (Three.js делает автоматически, но уменьшим количество теней)---
        let prev = performance.now();
        function gameLoop() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - prev) / 1000);
            prev = now;
            updateMovement(delta);
            animateClouds(delta);
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }
        gameLoop();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ Мегаполис запущен. Здания высотой до 28, тени улучшены, оптимизация включена.');
    </script>
</body>
</html>
