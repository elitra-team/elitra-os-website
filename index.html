<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitra OS — сайт не готов</title>
    <!-- Рукописный шрифт Caveat (живой, натуральный почерк) -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;  /* чёрный фон */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Caveat', cursive, 'Pacifico', 'Comic Neue', handwriting;
        }

        .message {
            color: #FFD700;       /* яркий жёлтый */
            font-size: 5rem;      /* очень крупный */
            font-weight: 700;
            text-align: center;
            padding: 1rem;
            line-height: 1.2;
            letter-spacing: 0.01em;
        }

        /* адаптация под экраны поменьше — шрифт остаётся крупным, но чуть уменьшается */
        @media (max-width: 700px) {
            .message {
                font-size: 3.6rem;
            }
        }

        @media (max-width: 480px) {
            .message {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="message">
        Ой, сайт пока не готов!
    </div>
</body>
</html>
