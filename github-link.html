<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход на GitHub</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: Arial, sans-serif;
            cursor: pointer;
        }
        video {
            display: none; /* Скрыто до клика */
            height: 100vh;
            width: 100vw;
            object-fit: cover; /* Видео растягивается без искажений */
        }
        /* Фейковый экран загрузки */
        .loader {
            color: white;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Экран, который заставит друга кликнуть -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Само видео (замените rick.mp4 на ваш файл) -->
    <video id="rick-video" loop playsinline>
        <source src="load_scene.mp4" type="video/mp4">
    </video>

    <script>
        const loader = document.getElementById('loader');
        const video = document.getElementById('rick-video');

        // Включаем видео со звуком ТОЛЬКО после клика в любом месте экрана
        document.body.addEventListener('click', () => {
            loader.style.display = 'none'; // Прячем загрузку
            video.style.display = 'block'; // Показываем видео
            
            // Запрашиваем полноэкранный режим (опционально, для максимального эффекта)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            video.play(); // Запускаем со звуком
        }, { once: true }); // Сработает только один раз
    </script>
</body>
</html>
